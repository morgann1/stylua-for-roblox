name: Build StyLua WASM

on:
    workflow_dispatch:
        inputs:
            force:
                description: "Rebuild even if version is unchanged"
                type: boolean
                default: false

permissions:
    contents: write

jobs:
    check:
        name: Check upstream release
        runs-on: ubuntu-latest
        outputs:
            latest: ${{ steps.decide.outputs.latest }}
            should_build: ${{ steps.decide.outputs.should_build }}
        steps:
            - name: Resolve target version
              id: decide
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  latest=$(gh release view --repo JohnnyMorganz/StyLua --json tagName --jq .tagName)
                  current=$(gh api "repos/${{ github.repository }}/contents/plugin/generated/stylua.version" --jq .content 2>/dev/null | base64 -d 2>/dev/null | tr -d '[:space:]')
                  [ -z "$current" ] && current="none"
                  echo "latest=$latest" >> "$GITHUB_OUTPUT"
                  echo "Latest: $latest, currently built: $current"
                  if [ "${{ inputs.force }}" = "true" ] || [ "$latest" != "$current" ]; then
                    echo "should_build=true" >> "$GITHUB_OUTPUT"
                    echo "Will build."
                  else
                    echo "should_build=false" >> "$GITHUB_OUTPUT"
                    echo "Already up to date — skipping."
                  fi

    build:
        name: Compile WASM and transpile to Luau
        needs: check
        if: needs.check.outputs.should_build == 'true'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Checkout StyLua source
              uses: actions/checkout@v6
              with:
                  repository: JohnnyMorganz/StyLua
                  ref: ${{ needs.check.outputs.latest }}
                  path: stylua-src

            - name: Install Rust toolchain (with wasm target)
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable
                  target: wasm32-unknown-unknown
                  cache: false
                  rustflags: ""

            - name: Cache cargo registry and target
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      stylua-src/target
                  key: cargo-${{ runner.os }}-${{ needs.check.outputs.latest }}
                  restore-keys: |
                      cargo-${{ runner.os }}-

            - name: Install Spider (wasm-to-luau transpiler)
              run: cargo install --git https://github.com/SovereignSatellite/Spider --locked

            - name: Build StyLua to wasm32
              working-directory: stylua-src
              run: cargo build --target wasm32-unknown-unknown --release --features lua52,lua53,lua54,luajit,luau,cfxlua

            - name: Transpile WASM to Luau
              run: |
                  mkdir -p plugin/generated
                  spider-cli --optimize \
                    stylua-src/target/wasm32-unknown-unknown/release/stylua_lib.wasm \
                    > plugin/generated/stylua.luau
                  echo "${{ needs.check.outputs.latest }}" > plugin/generated/stylua.version

            - name: Commit and push
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: "build: update StyLua WASM to ${{ needs.check.outputs.latest }}"
                  file_pattern: plugin/generated/stylua.luau plugin/generated/stylua.version
                  commit_user_name: github-actions[bot]
                  commit_user_email: github-actions[bot]@users.noreply.github.com
