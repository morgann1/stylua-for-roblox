name: Release

on:
    workflow_dispatch:
        inputs:
            tag:
                description: "Release tag (e.g. v0.1.0)"
                required: true
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install Rokit
              uses: CompeyDev/setup-rokit@v0.1.2
              with:
                  cache: true
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Resolve tag
              id: meta
              run: |
                  TAG="${{ github.event.inputs.tag || github.ref_name }}"
                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"

            - name: Install packages
              run: lute run install

            - name: Build StyluaForRoblox.rbxm
              run: lute run build

            - name: Build release notes
              id: notes
              run: |
                  TAG="${{ steps.meta.outputs.tag }}"

                  PREV=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)
                  if [ -n "$PREV" ]; then
                    URL="${{ github.server_url }}/${{ github.repository }}/compare/$PREV...$TAG"
                  else
                    URL="${{ github.server_url }}/${{ github.repository }}/commits/$TAG"
                  fi

                  SECTION=$(lute run release-notes --tag "$TAG")

                  {
                    echo "body<<RELEASE_EOF"
                    echo "$SECTION"
                    echo ""
                    echo "---"
                    echo ""
                    echo "**Full changelog**: $URL"
                    echo "RELEASE_EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Create release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ steps.meta.outputs.tag }}
                  files: StyluaForRoblox.rbxm
                  body: ${{ steps.notes.outputs.body }}
                  prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
