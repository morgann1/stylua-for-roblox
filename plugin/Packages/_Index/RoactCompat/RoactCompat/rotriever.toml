[package]
name = "RoactCompat"
version = "17.3.8"
readme = "README.md"
content_root = "src"
files = [
    "*",
    "!**/__tests__/**",
]
publish = true
authors = [
    "Paul Doyle <pdoyle@roblox.com>",
    "Matt Hargett <mhargett@roblox.com>",
    "Max Mines <mmines@roblox.com>",
    "Carlo Conte <cconte@roblox.com>",
    "Henry Allen <hallen@roblox.com>",
    "Olivier Trepanier <otrepanier@roblox.com>",
    "Hugh Collins <hcollins@roblox.com>",
]
[dependencies.LuauPolyfill]
target = "https://github.com/roblox/luau-polyfill"
version = "^1"

[dependencies.React]
package = "React"
version = "^17.3.8"

[dependencies.ReactGlobals]
package = "ReactGlobals"
version = "^17.3.8"

[dependencies.ReactRoblox]
package = "ReactRoblox"
version = "^17.3.8"

[dependencies.Shared]
package = "Shared"
version = "^17.3.8"
[dev_dependencies.JestGlobals]
target = "https://github.com/roblox/jest-roblox"
version = "^3"

[dev_dependencies.Roact]
target = "https://github.com/roblox/roact"
version = "^1.4.0"

[dev_dependencies.Scheduler]
package = "Scheduler"
version = "^17.3.8"
